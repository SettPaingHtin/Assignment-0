<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Vector Operations</title>
        <style>
            body { font-family: Arial, sans-serif; margin: 20px; }
            .controls { margin-top: 15px; }
            .control-group { margin-bottom: 10px; }
        </style>
    </head>

    <body onload="main()">
        <h2>
            Sett Paing Htin<br>
            shtin@ucsc.edu
        </h2>
        
        <canvas id="example" width="400" height="400" style="border: 1px solid black;">
            Please use a browser that supports "canvas"
        </canvas>

        <div class="controls">
            <div class="control-group">
                <b>Vector v1:</b> 
                x: <input type="number" id="v1_x" value="2.25" step="0.1" style="width: 50px;">
                y: <input type="number" id="v1_y" value="2.25" step="0.1" style="width: 50px;">
            </div>
            <div class="control-group">
                <b>Vector v2:</b> 
                x: <input type="number" id="v2_x" value="2.25" step="0.1" style="width: 50px;">
                y: <input type="number" id="v2_y" value="-2.25" step="0.1" style="width: 50px;">
            </div>
            <button onclick="handleDrawEvent()">Draw</button>
            <hr>
            
            <div class="control-group">
                <b>Operation:</b>
                <select id="operation">
                    <option value="add">Add</option>
                    <option value="sub">Subtract</option>
                    <option value="mul">Multiply</option>
                    <option value="div">Divide</option>
                    <option value="magnitude">Magnitude</option>
                    <option value="normalize">Normalize</option>
                    <option value="angleBetween">Angle Between</option>
                    <option value="area">Area</option>
                </select>
                Scalar: <input type="number" id="scalar" value="2" step="0.1" style="width: 50px;">
            </div>
            <button onclick="handleDrawOperationEvent()">Draw Operation</button>
        </div>

        <script src="lib/cuon-matrix-cse160.js"></script>
        <script src="asg0.js"></script>
    </body>
</html>
